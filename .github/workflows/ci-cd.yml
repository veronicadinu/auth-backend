name: CI/CD Backend

# Robotul pornește când dai push pe main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    # Permisiuni ca să poată publica imaginea pe GitHub
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descarcă codul din repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instalează Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalează dependențele
      - name: Install dependencies
        run: npm ci

      # 4. Compilează TypeScript
      - name: Build TypeScript
        run: npm run build

      # 5. Loghează-te în GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Construiește și publică imaginea Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend-app:latest
            ghcr.io/${{ github.repository_owner }}/backend-app:${{ github.sha }}